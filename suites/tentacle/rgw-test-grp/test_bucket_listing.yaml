tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Bucket radoslist
    desc: radoslist on all buckets
    polarion-id: CEPH-83574480
    module: sanity_rgw.py
    config:
      script-name: test_bucket_listing.py
      config-file-name: test_bucket_radoslist.yaml
- test:
    config:
      script-name: test_bucket_listing.py
      config-file-name: test_bucket_listing_flat_ordered.yaml
      run-on-haproxy: true
    desc: test duration for ordered listing of bucket with top level objects
    module: sanity_rgw.py
    name: ordered listing of buckets pre upgrade
    polarion-id: CEPH-83573545
- test:
    config:
      script-name: test_bucket_listing.py
      config-file-name: test_bucket_radoslist.yaml
      run-on-haproxy: true
    desc: Test bucket stats and radoslist on all buckets
    module: sanity_rgw.py
    name: test bucket stats and radoslist
    polarion-id: CEPH-83574480
- test:
    name: Test bucket listing is not truncated
    desc: Test bucket listing is not truncated
    polarion-id: CEPH-83575816
    module: sanity_rgw.py
    config:
      script-name: test_bucket_listing.py
      config-file-name: test_bucket_list_not_truncated.yaml
