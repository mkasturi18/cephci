tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Test CORS Feature
    desc: Test CORS feature
    polarion-id: CEPH-10355
    module: sanity_rgw.py
    config:
      run-on-rgw: true
      script-name: ../curl/test_cors_using_curl.py
      config-file-name: ../../curl/configs/test_cors_using_curl.yaml
- test:
    name: Test CRLF Injection
    desc: Test CRLF Injection
    polarion-id: CEPH-83574745
    module: sanity_rgw.py
    config:
      run-on-rgw: true
      script-name: ../curl/test_cors_using_curl.py
      config-file-name: ../../curl/configs/test_crlf_injection_curl.yaml
- test:
    name: Test Inditex hotfix bz CORS presigned put url
    desc: CORS ACLs prevents access to buckets with presigned PUT URIs with ACL private header
    polarion-id: CEPH-83604475
    module: sanity_rgw.py
    config:
      script-name: ../curl/test_cors_using_curl.py
      config-file-name: ../../curl/configs/test_cors_presigned_put_url_using_curl.yaml
