tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Bucket link and unlink
    desc: Bucket move between tenanted and non tenanted users
    polarion-id: CEPH-83572908
    module: sanity_rgw.py
    config:
      test-version: v2
      script-name: test_user_bucket_rename.py
      config-file-name: test_bucket_link_unlink.yaml
- test:
    name: User rename
    polarion-id: CEPH-83574811
    desc: RGW User rename script
    module: sanity_rgw.py
    config:
      script-name: test_user_bucket_rename.py
      config-file-name: test_user_rename.yaml
- test:
    name: Bucket rename
    desc: RGW Bucket rename script
    polarion-id: CEPH-83572908
    module: sanity_rgw.py
    config:
      test-version: v2
      script-name: test_user_bucket_rename.py
      config-file-name: test_bucket_rename.yaml
- test:
    name: Object Unlink
    desc: RGW Object unlink BZ 2401174
    polarion-id: CEPH-83572908
    module: sanity_rgw.py
    config:
      test-version: v2
      script-name: test_user_bucket_rename.py
      config-file-name: test_object_unlink.yaml
