tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Test large omap creation pre upgrade
    desc: Test large omap creation pre upgrade
    polarion-id: CEPH-83591446
    module: sanity_rgw.py
    config:
      script-name: ../s3cmd/test_large_omap.py
      config-file-name: ../../s3cmd/configs/test_large_omap_clearance_brown_field_pre_upgrade.yaml
      run-on-haproxy: true
- test:
    name: Test large omap clearance post upgrade
    desc: Test large omap clearance post upgrade
    polarion-id: CEPH-83591446
    module: sanity_rgw.py
    config:
      script-name: ../s3cmd/test_large_omap.py
      config-file-name: ../../s3cmd/configs/test_large_omap_clearance_brown_field_post_upgrade.yaml
      run-on-haproxy: true
- test:
    name: Test large omap creation and clearance
    desc: Test large omap creation and clearance
    polarion-id: CEPH-83591446
    module: sanity_rgw.py
    config:
      script-name: ../s3cmd/test_large_omap.py
      config-file-name: ../../s3cmd/configs/test_large_omap_clearance_green_field.yaml
      run-on-haproxy: true
