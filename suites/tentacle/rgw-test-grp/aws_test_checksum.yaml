tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Test Checksum on all supported algorithms
    desc: Test Checksum on all supported algorithms
    polarion-id: CEPH-83591679
    module: sanity_rgw.py
    config:
      run-on-rgw: true
      script-name: ../aws/test_checksum.py
      config-file-name: ../../aws/configs/test_checksum_api.yaml
- test:
    name: Test Checksum which is wrongly computed
    desc: Test Checksum which is wrongly computed
    polarion-id: CEPH-83591699
    module: sanity_rgw.py
    config:
      run-on-rgw: true
      script-name: ../aws/test_checksum.py
      config-file-name: ../../aws/configs/test_wrong_checksum.yaml
- test:
    name: test checksum with awscli_v1_v2 small objects
    desc: test checksum with awscli_v1_v2 small objects
    polarion-id: CEPH-83591699
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_checksum_with_awscli_v1_and_v2.py
      config-file-name: ../../aws/configs/test_checksum_awscli_v1_v2_small_objects.yaml
- test:
    name: test checksum with awscli_v1_v2 non-multipart objects
    desc: test checksum with awscli_v1_v2 non-multipart objects
    polarion-id: CEPH-83591699
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_checksum_with_awscli_v1_and_v2.py
      config-file-name: ../../aws/configs/test_checksum_awscli_v1_v2_non_multipart.yaml
- test:
    name: test checksum with awscli_v1_v2 multipart objects
    desc: test checksum with awscli_v1_v2 multipart objects
    polarion-id: CEPH-83591699
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_checksum_with_awscli_v1_and_v2.py
      config-file-name: ../../aws/configs/test_checksum_awscli_v1_v2_multipart.yaml
