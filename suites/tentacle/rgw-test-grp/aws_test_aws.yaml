tests:
- test:
    abort-on-fail: true
    desc: Install software pre-requisites for cluster deployment.
    module: install_prereq.py
    name: setup pre-requisites
- test:
    abort-on-fail: true
    config:
      verify_cluster_health: true
      steps:
      - config:
          command: bootstrap
          service: cephadm
          args:
            registry-url: registry.redhat.io
            mon-ip: node1
            initial-dashboard-password: admin@123
            dashboard-password-noupdate: true
            orphan-initial-daemons: true
            skip-monitoring-stack: true
      - config:
          command: add_hosts
          service: host
          args:
            attach_ip_address: true
            labels: apply-all-labels
      - config:
          command: apply
          service: osd
          args:
            all-available-devices: true
      - config:
          command: apply
          service: rgw
          pos_args:
          - rgw.1
          args:
            placement:
              label: rgw
              nodes:
              - node3
              - node4
              - node5
    desc: bootstrap with registry-url option and deployment services.
    destroy-cluster: false
    polarion-id: CEPH-83573713
    module: test_cephadm.py
    name: RHCS deploy cluster using cephadm
- test:
    name: Test create existing bucket with rgw_bucket_eexist_override set through AWS
    desc: Test create existing bucket with rgw config rgw_bucket_eexist_override through AWS
    polarion-id: CEPH-83620440
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_aws.py
      config-file-name: ../../aws/configs/test_aws_create_bucket_for_existing_bucket.yaml
      run-on-haproxy: true
- test:
    name: Test S3 PUT requests with non ascii characters in body
    desc: Test S3 PUT requests with non ascii characters in body
    polarion-id: CEPH-83572765
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_aws.py
      config-file-name: ../../aws/configs/test_aws_non_ascii.yaml
- test:
    name: Test bucket listing with markers on versioned bucket
    desc: Test bucket listing with markers on versioned bucket
    polarion-id: CEPH-83572736
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_aws.py
      config-file-name: ../../aws/configs/test_versioned_list_marker.yaml
- test:
    name: Verify unified namespace for S3 and swift
    desc: Verify unified namespace for S3 and swift
    polarion-id: CEPH-83572907
    module: sanity_rgw.py
    config:
      install_keystone_ldap: true
      script-name: ../aws/test_unified_namespace.py
      config-file-name: ../../aws/configs/test_unified_namespace.yaml
- test:
    name: Test scenario of object deletion with version id
    desc: Test scenario of object deletion with version id
    polarion-id: CEPH-83576431
    module: sanity_rgw.py
    config:
      script-name: ../aws/test_delete_version_id_null.py
      config-file-name: ../../aws/configs/test_no_crash_while_ver_deletion.yaml
